<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP 策略（仅允许必要来源） -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; frame-src *;">
  <title>影视解析工具</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ========== 深色主题全局样式 ========== */
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-card: #242424;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text-primary: #f1f1f1;
      --text-secondary: #9ca3af;
      --border: #333333;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ========== 自定义滚动条 ========== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }
    ::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* ========== 播放器容器 ========== */
    .player-container {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .player-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ========== 状态提示动画 ========== */
    @keyframes pulse-glow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .status-loading {
      animation: pulse-glow 1.5s ease-in-out infinite;
    }

    /* ========== 按钮旋转动画 ========== */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }

    /* ========== 历史记录卡片悬停 ========== */
    .history-item:hover .delete-btn {
      opacity: 1;
    }

    /* ========== 平台标签颜色 ========== */
    .platform-tencent { background: #ff6b6b; }
    .platform-iqiyi { background: #00be06; }
    .platform-youku { background: #ff8300; }
    .platform-mgtv { background: #ff3d00; }
    .platform-bilibili { background: #00a1d6; }

    /* ========== 输入框样式 ========== */
    input[type="text"] {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 16px; /* 防止iOS自动缩放 */
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    /* ========== 历史记录项动画 ========== */
    .history-item {
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== 复制按钮样式 ========== */
    .copy-btn {
      opacity: 0;
      transition: all 0.2s ease;
    }
    .history-item:hover .copy-btn {
      opacity: 1;
    }

    /* ========== 重试按钮 ========== */
    .retry-btn {
      animation: pulse-glow 1.5s ease-in-out infinite;
    }

    /* ========== 线路按钮样式 ========== */
    .server-btn {
      transition: all 0.2s ease;
    }
    .server-btn:hover {
      transform: translateY(-1px);
    }
    .server-btn.active {
      background: var(--accent) !important;
      color: white;
    }

    /* ========== 画质按钮样式 ========== */
    .quality-btn {
      transition: all 0.2s ease;
    }
    .quality-btn:hover {
      transform: translateY(-1px);
    }
    .quality-btn.active {
      background: var(--accent) !important;
      color: white;
    }

    /* ========== 移动端适配 ========== */
    @media (max-width: 640px) {
      .desktop-only { display: none; }
      .mobile-full { width: 100% !important; }
    }
  </style>
</head>
<body>

  <!-- ==================== 主容器 ==================== -->
  <div class="max-w-4xl mx-auto px-4 py-6">

    <!-- ========== 顶部标题区 ========== -->
    <header class="text-center mb-8">
      <h1 class="text-2xl sm:text-3xl font-bold mb-2">
        <span class="text-[#3b82f6]">影视</span>解析工具
      </h1>
      <p class="text-sm text-[#9ca3af]">
        支持腾讯视频 · 爱奇艺 · 优酷 · 芒果TV · B站
      </p>
      <!-- 免责提示 -->
      <div class="mt-3 inline-block px-4 py-2 bg-[#1a1a1a] rounded-lg border border-[#333]">
        <p class="text-xs text-[#9ca3af]">
          仅供个人学习使用，请支持正版平台
        </p>
      </div>
    </header>

    <!-- ========== 链接输入区 ========== -->
    <section class="mb-6">
      <div class="flex flex-col sm:flex-row gap-3">
        <input
          type="text"
          id="urlInput"
          class="flex-1 px-4 py-3 rounded-lg text-sm transition-all"
          placeholder="请粘贴视频页面链接，如：https://v.qq.com/x/cover/..."
          autocomplete="off"
          spellcheck="false"
        >
        <button
          id="parseBtn"
          onclick="handleParse()"
          class="px-6 py-3 bg-[#3b82f6] hover:bg-[#2563eb] text-white font-medium rounded-lg transition-all flex items-center justify-center gap-2 min-w-[120px]"
        >
          <svg id="parseBtnIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <span id="parseBtnText">开始解析</span>
        </button>
      </div>
    </section>

    <!-- ========== 状态提示区 ========== -->
    <section id="statusArea" class="mb-6">
      <div class="flex items-center justify-center gap-2 py-3 text-sm text-[#9ca3af]">
        <svg id="statusIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span id="statusText">请输入视频链接后点击解析</span>
      </div>
      <div id="retryArea" class="hidden text-center mt-2">
        <button onclick="handleRetry()" class="retry-btn px-4 py-2 bg-[#3b82f6] hover:bg-[#2563eb] text-white text-sm rounded-lg transition-all">
          重新解析
        </button>
      </div>
    </section>

    <!-- ========== 播放器区域 ========== -->
    <section id="playerSection" class="mb-6 hidden">
      <!-- 画质选择栏 -->
      <div id="qualitySection" class="mb-3 hidden">
        <div class="flex items-center gap-3">
          <span class="text-xs text-[#9ca3af]">画质:</span>
          <div id="qualityList" class="flex flex-wrap gap-2">
            <!-- 动态生成画质按钮 -->
          </div>
        </div>
      </div>
      <div class="player-container" id="playerWrapper">
        <iframe
          id="videoPlayer"
          loading="lazy"
          allow="autoplay; fullscreen; picture-in-picture"
          allowfullscreen
          referrerpolicy="no-referrer"
          sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-pointer-lock"
        ></iframe>
      </div>
    </section>

    <!-- ========== 线路选择区 ========== -->
    <section id="serverSection" class="mb-6 hidden">
      <div class="bg-[#1a1a1a] rounded-xl p-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-medium text-[#9ca3af]">解析线路</h3>
          <span id="serverStatus" class="text-xs text-[#666]"></span>
        </div>
        <div id="serverList" class="flex flex-wrap gap-2">
          <!-- 动态生成线路按钮 -->
        </div>
      </div>
    </section>

    <!-- ========== 历史记录区 ========== -->
    <section id="historySection">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-medium text-[#9ca3af] flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          播放历史
        </h3>
        <button
          id="clearHistoryBtn"
          onclick="handleClearHistory()"
          class="text-xs text-[#666] hover:text-[#ff6b6b] transition-colors hidden"
        >
          清空历史
        </button>
      </div>

      <div id="historyList" class="space-y-2">
        <!-- 动态生成历史记录 -->
        <p id="emptyHistory" class="text-center text-sm text-[#666] py-4">
          暂无播放历史
        </p>
      </div>
    </section>

    <!-- ========== 底部免责 ========== -->
    <footer class="mt-10 pt-6 border-t border-[#333] text-center">
      <p class="text-xs text-[#666]">
        本工具仅供个人学习使用，所有功能均在本地浏览器运行，不收集、不上传任何数据
      </p>
    </footer>

  </div>

  <!-- ==================== JavaScript 逻辑 ==================== -->
  <script>
    /**
     * =====================================================
     * 配置区
     * =====================================================
     */

    /** 解析服务器列表 - 公共接口 */
    const PARSE_SERVERS = [
      { name: '线路1', url: 'https://jsonplayer.com/player?url=' },
      { name: '线路2', url: 'https://vip.mlinks.cc/api/jiexi?url=' },
      { name: '线路3', url: 'https://jx.jsonplayer.com/player/?url=' },
      { name: '线路4', url: 'https://jx.xdaili.cn/player/?url=' },
      { name: '线路5', url: 'https://www.ckplayer.vip/jiexi/?url=' },
      { name: '线路6', url: 'https://jx.dijia.cc/?url=' },
      { name: '线路7', url: 'https://mjpg.m3u8.top/?url=' },
    ];

    /** 画质选项 */
    const QUALITY_OPTIONS = ['自动', '1080P', '720P', '480P', '360P'];

    /** localStorage 键名 */
    const STORAGE_KEY = 'videoParseHistory';

    /** 最大历史记录条数 */
    const MAX_HISTORY = 50;

    /** 单线路超时时间(ms) */
    const TIMEOUT_MS = 3000;

    /** 平台正则匹配规则 */
    const PLATFORM_RULES = [
      { name: '腾讯视频', pattern: /v\.qq\.com\/x\/cover\/|v\.qq\.com\/x\/page\//, class: 'platform-tencent' },
      { name: '爱奇艺', pattern: /iqiyi\.com\//, class: 'platform-iqiyi' },
      { name: '优酷', pattern: /youku\.com\//, class: 'platform-youku' },
      { name: '芒果TV', pattern: /mgtv\.com\//, class: 'platform-mgtv' },
      { name: '哔哩哔哩', pattern: /bilibili\.com\//, class: 'platform-bilibili' },
    ];

    /**
     * =====================================================
     * 状态管理
     * =====================================================
     */

    /** 全局状态 */
    let currentUrl = '';           // 当前解析的URL
    let currentServerIndex = 0;     // 当前线路索引
    let currentQuality = '自动';    // 当前画质选择
    let isParsing = false;          // 是否正在解析
    let abortControllers = [];      // 存储AbortController用于取消请求
    let timeoutIds = [];            // 存储timeout ID用于清理

    // DOM 元素缓存
    const $ = (id) => document.getElementById(id);
    const urlInput = $('urlInput');
    const parseBtn = $('parseBtn');
    const parseBtnIcon = $('parseBtnIcon');
    const parseBtnText = $('parseBtnText');
    const statusText = $('statusText');
    const statusIcon = $('statusIcon');
    const statusArea = $('statusArea');
    const retryArea = $('retryArea');
    const playerSection = $('playerSection');
    const videoPlayer = $('videoPlayer');
    const qualitySection = $('qualitySection');
    const qualityList = $('qualityList');
    const serverSection = $('serverSection');
    const serverList = $('serverList');
    const serverStatus = $('serverStatus');
    const historySection = $('historySection');
    const historyList = $('historyList');
    const emptyHistory = $('emptyHistory');
    const clearHistoryBtn = $('clearHistoryBtn');

    /**
     * =====================================================
     * 工具函数
     * =====================================================
     */

    /**
     * 检测URL对应的平台
     * @param {string} url
     * @returns {object|null} 平台信息
     */
    function detectPlatform(url) {
      for (const rule of PLATFORM_RULES) {
        if (rule.pattern.test(url)) {
          return rule;
        }
      }
      return null;
    }

    /**
     * 格式化时间戳为可读字符串
     * @param {number} timestamp
     * @returns {string}
     */
    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;

      // 1分钟内
      if (diff < 60 * 1000) return '刚刚';
      // 1小时内
      if (diff < 60 * 60 * 1000) return `${Math.floor(diff / 60000)}分钟前`;
      // 24小时内
      if (diff < 24 * 60 * 60 * 1000) return `${Math.floor(diff / 3600000)}小时前`;
      // 超过24小时显示日期
      return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
    }

    /**
     * 从URL中提取域名作为显示名
     * @param {string} url
     * @returns {string}
     */
    function getDomainName(url) {
      try {
        const hostname = new URL(url).hostname;
        return hostname.replace('www.', '').split('.')[0];
      } catch {
        return url.substring(0, 30) + '...';
      }
    }

    /**
     * 从URL中提取视频名称和集数信息
     * @param {string} url
     * @param {string} platformName
     * @returns {{videoName: string, episode: string}}
     */
    function extractVideoInfo(url, platformName) {
      try {
        const urlObj = new URL(url);
        const path = urlObj.pathname;
        const segments = path.split('/').filter(s => s);

        let videoName = '';
        let episode = '';

        // B站特殊处理 - 提取BV号
        if (platformName === '哔哩哔哩') {
          const bvMatch = path.match(/BV[\w]+/);
          if (bvMatch) {
            videoName = bvMatch[0];
          } else {
            const avMatch = path.match(/av\d+/i);
            if (avMatch) {
              videoName = avMatch[0].toUpperCase();
            }
          }
          // B站集数提取
          const epMatch = path.match(/ep(\d+)/);
          const pMatch = path.match(/p=(\d+)/);
          if (epMatch) {
            episode = `ep${epMatch[1]}`;
          } else if (pMatch) {
            episode = `p${pMatch[1]}`;
          }
          return { videoName: videoName || 'B站视频', episode };
        }

        // 其他平台 - 取URL最后一段作为视频标识
        if (segments.length > 0) {
          const lastSegment = segments[segments.length - 1];
          // 去除.html等后缀
          videoName = lastSegment.replace(/\.(html?|htm|php|jsp|asp|shtml)?$/i, '');
          // 尝试识别集数模式
          const episodePatterns = [
            /第?(\d+)[集话期]/,
            /(\d+)集$/,
            /ep?(\d+)/i,
            /(\d+)话$/,
          ];
          for (const pattern of episodePatterns) {
            const match = videoName.match(pattern);
            if (match) {
              episode = `第${match[1]}集`;
              // 从视频名中移除集数部分
              videoName = videoName.replace(pattern, '').replace(/[_\-]+$/, '');
              break;
            }
          }
        }

        // 腾讯视频特殊处理
        if (platformName === '腾讯视频') {
          // v.qq.com/x/cover/xxxxx/xxxxx.html 或 v.qq.com/x/page/xxxxx.html
          const coverMatch = path.match(/\/cover\/([^\/]+)\//);
          const pageMatch = path.match(/\/page\/([^\/\.]+)/);
          if (coverMatch) {
            videoName = coverMatch[1];
          } else if (pageMatch) {
            videoName = pageMatch[1];
          }
        }

        // 优酷特殊处理
        if (platformName === '优酷') {
          const idMatch = path.match(/\/id_([^\/]+)/);
          if (idMatch) {
            videoName = idMatch[1];
          }
        }

        return {
          videoName: videoName || getDomainName(url),
          episode: episode
        };
      } catch {
        return { videoName: getDomainName(url), episode: '' };
      }
    }

    /**
     * 清理所有待处理的请求和定时器
     */
    function cleanup() {
      abortControllers.forEach(ac => ac && ac.abort());
      abortControllers = [];
      timeoutIds.forEach(id => clearTimeout(id));
      timeoutIds = [];
    }

    /**
     * =====================================================
     * 状态更新函数
     * =====================================================
     */

    /** 更新状态提示 */
    function updateStatus(text, type = 'info', showRetry = false) {
      statusText.textContent = text;

      // 移除所有状态类
      statusArea.classList.remove('bg-[#1a1a1a]', 'bg-[#1e3a5f]', 'bg-[#1a2e1a]', 'bg-[#3a1e1e]');

      // 更新状态图标颜色
      statusIcon.classList.remove('text-[#3b82f6]', 'text-[#22c55e]', 'text-[#ff6b6b]', 'text-[#9ca3af]');

      switch (type) {
        case 'loading':
          statusArea.classList.add('bg-[#1a1a1a]');
          statusText.className = 'text-sm text-[#3b82f6] status-loading';
          statusIcon.classList.add('text-[#3b82f6]');
          retryArea.classList.add('hidden');
          break;
        case 'success':
          statusArea.classList.add('bg-[#1a2e1a]');
          statusText.className = 'text-sm text-[#22c55e]';
          statusIcon.classList.add('text-[#22c55e]');
          retryArea.classList.add('hidden');
          break;
        case 'error':
          statusArea.classList.add('bg-[#3a1e1e]');
          statusText.className = 'text-sm text-[#ff6b6b]';
          statusIcon.classList.add('text-[#ff6b6b]');
          if (showRetry) {
            retryArea.classList.remove('hidden');
          } else {
            retryArea.classList.add('hidden');
          }
          break;
        default:
          statusArea.classList.add('bg-[#1a1a1a]');
          statusText.className = 'text-sm text-[#9ca3af]';
          statusIcon.classList.add('text-[#9ca3af]');
          retryArea.classList.add('hidden');
      }
    }

    /** 更新解析按钮状态 */
    function updateParseButton(loading = false) {
      if (loading) {
        parseBtn.disabled = true;
        parseBtn.classList.add('opacity-75', 'cursor-not-allowed');
        parseBtnIcon.innerHTML = `
          <svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>`;
        parseBtnText.textContent = '解析中...';
      } else {
        parseBtn.disabled = false;
        parseBtn.classList.remove('opacity-75', 'cursor-not-allowed');
        parseBtnIcon.innerHTML = `
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>`;
        parseBtnText.textContent = '开始解析';
      }
    }

    /** 更新线路按钮UI */
    function updateServerButtons() {
      const buttons = serverList.querySelectorAll('button');
      buttons.forEach((btn, index) => {
        btn.classList.remove('active');
        if (index === currentServerIndex) {
          btn.classList.add('active');
        }
      });

      if (currentServerIndex < PARSE_SERVERS.length) {
        serverStatus.textContent = `当前: ${PARSE_SERVERS[currentServerIndex].name}`;
      }
    }

    /**
     * =====================================================
     * 历史记录管理
     * =====================================================
     */

    /** 从localStorage读取历史记录 */
    function getHistory() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
      } catch {
        return [];
      }
    }

    /** 保存历史记录到localStorage */
    function saveHistory(history) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
      } catch (e) {
        console.warn('localStorage存储失败:', e);
      }
    }

    /** 添加历史记录 */
    function addHistory(url) {
      const platform = detectPlatform(url);
      const videoInfo = extractVideoInfo(url, platform ? platform.name : '');
      const history = getHistory();

      // 移除重复记录
      const filtered = history.filter(item => item.url !== url);

      // 添加到开头
      filtered.unshift({
        url,
        platform: platform ? platform.name : '未知平台',
        platformClass: platform ? platform.class : 'bg-[#666]',
        timestamp: Date.now(),
        domain: getDomainName(url),
        videoName: videoInfo.videoName,
        episode: videoInfo.episode
      });

      // 限制最大条数
      if (filtered.length > MAX_HISTORY) {
        filtered.pop();
      }

      saveHistory(filtered);
      renderHistory();
    }

    /** 删除单条历史记录 */
    function deleteHistory(index, event) {
      event.stopPropagation();
      const history = getHistory();
      history.splice(index, 1);
      saveHistory(history);
      renderHistory();
    }

    /** 清空所有历史 */
    function handleClearHistory() {
      if (confirm('确定要清空所有播放历史吗？')) {
        saveHistory([]);
        renderHistory();
      }
    }

    /** 渲染历史记录列表 */
    function renderHistory() {
      const history = getHistory();

      if (history.length === 0) {
        emptyHistory.classList.remove('hidden');
        clearHistoryBtn.classList.add('hidden');
        // 清空多余子元素但保留emptyHistory
        const items = historyList.querySelectorAll('.history-item');
        items.forEach(item => item.remove());
        return;
      }

      emptyHistory.classList.add('hidden');
      clearHistoryBtn.classList.remove('hidden');

      // 清除旧的历史记录项（保留emptyHistory）
      const items = historyList.querySelectorAll('.history-item');
      items.forEach(item => item.remove());

      // 创建新的历史记录项
      history.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'history-item flex items-center gap-3 px-4 py-3 bg-[#1a1a1a] rounded-lg cursor-pointer transition-all hover:bg-[#252525] group';
        div.onclick = () => replayHistory(item.url);

        // 显示视频名称（优先显示提取的名称，其次域名）
        const displayName = item.videoName || item.domain;
        const displayInfo = item.episode ? `${displayName} · ${item.episode}` : displayName;

        div.innerHTML = `
          <span class="w-2 h-2 rounded-full ${item.platformClass} flex-shrink-0"></span>
          <div class="flex-1 min-w-0">
            <p class="text-sm text-[#f1f1f1] truncate" title="${displayName}">${displayInfo}</p>
            <p class="text-xs text-[#666]">${item.platform} · ${formatTime(item.timestamp)}</p>
          </div>
          <button class="copy-btn text-[#666] hover:text-[#3b82f6] transition-all p-1" onclick="copyHistoryUrl('${item.url}', ${index}, event)" title="复制链接">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>
          </button>
          <button class="delete-btn opacity-0 text-[#666] hover:text-[#ff6b6b] transition-all p-1" onclick="deleteHistory(${index}, event)">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        `;

        historyList.appendChild(div);
      });
    }

    /** 重播历史记录 */
    function replayHistory(url) {
      urlInput.value = url;
      handleParse();
    }

    /**
     * 复制链接到剪贴板
     * @param {string} url
     * @param {number} index
     * @param {Event} event
     */
    function copyHistoryUrl(url, index, event) {
      event.stopPropagation();
      navigator.clipboard.writeText(url).then(() => {
        updateStatus('链接已复制到剪贴板', 'success');
        setTimeout(() => {
          if (!isParsing) {
            updateStatus('解析成功，播放中', 'success');
          }
        }, 2000);
      }).catch(() => {
        updateStatus('复制失败，请手动复制', 'error');
      });
    }

    /**
     * 重新解析当前链接
     */
    function handleRetry() {
      if (currentUrl) {
        currentServerIndex = 0;
        parseWithServer(currentUrl, 0);
      }
    }

    /**
     * =====================================================
     * 线路管理
     * =====================================================
     */

    /** 渲染线路按钮列表 */
    function renderServers() {
      serverList.innerHTML = '';

      PARSE_SERVERS.forEach((server, index) => {
        const btn = document.createElement('button');
        btn.className = `server-btn px-3 py-1.5 text-xs rounded-md bg-[#242424] text-[#9ca3af] border border-[#333] transition-all ${index === 0 ? 'active' : ''}`;
        btn.textContent = server.name;
        btn.onclick = () => switchServer(index);

        serverList.appendChild(btn);
      });
    }

    /**
     * 渲染画质选择按钮
     */
    function renderQualityButtons() {
      qualityList.innerHTML = '';
      currentQuality = '自动'; // 重置为自动

      QUALITY_OPTIONS.forEach((quality, index) => {
        const btn = document.createElement('button');
        btn.className = `quality-btn px-3 py-1.5 text-xs rounded-md bg-[#242424] text-[#9ca3af] border border-[#333] transition-all ${index === 0 ? 'active' : ''}`;
        btn.textContent = quality;
        btn.onclick = () => selectQuality(quality, btn);
        qualityList.appendChild(btn);
      });
    }

    /**
     * 选择画质
     * @param {string} quality
     * @param {HTMLElement} btn
     */
    function selectQuality(quality, btn) {
      currentQuality = quality;

      // 更新UI
      qualityList.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // 注意：公共解析接口通常不支持画质参数切换，此处仅更新UI状态
      updateStatus(`已切换画质: ${quality}（如播放不清晰请手动切换解析线路）`, 'success');

      // 3秒后恢复状态提示
      setTimeout(() => {
        if (!isParsing) {
          updateStatus('解析成功，播放中', 'success');
        }
      }, 3000);
    }

    /** 切换到指定线路 */
    function switchServer(index) {
      if (index === currentServerIndex || isParsing) return;

      currentServerIndex = index;
      updateServerButtons();

      // 使用新线路重新解析
      if (currentUrl) {
        parseWithServer(currentUrl, currentServerIndex);
      }
    }

    /**
     * =====================================================
     * 核心解析逻辑
     * =====================================================
     */

    /**
     * 主解析函数 - 入口
     */
    async function handleParse() {
      // 防止重复点击
      if (isParsing) return;

      const url = urlInput.value.trim();

      // URL验证
      if (!url) {
        updateStatus('请输入视频链接', 'error');
        return;
      }

      // 简单验证是否为有效URL
      try {
        new URL(url);
      } catch {
        updateStatus('链接格式错误，请检查后重试', 'error');
        return;
      }

      // 检测平台
      const platform = detectPlatform(url);
      if (!platform) {
        updateStatus('暂不支持该平台，请输入腾讯/爱奇艺/优酷/芒果/B站的视频链接', 'error');
        return;
      }

      // 开始解析
      currentUrl = url;
      currentServerIndex = 0;
      isParsing = true;

      // 更新UI
      updateParseButton(true);
      updateStatus('正在解析链接，请稍候...', 'loading');
      playerSection.classList.add('hidden');
      serverSection.classList.remove('hidden');
      renderServers();
      updateServerButtons();

      // 执行解析
      await parseWithServer(url, 0);
    }

    /**
     * 使用指定线路解析
     * @param {string} url 视频URL
     * @param {number} serverIndex 线路索引
     */
    async function parseWithServer(url, serverIndex) {
      // 清理之前的请求
      cleanup();

      if (serverIndex >= PARSE_SERVERS.length) {
        // 所有线路都失败了
        isParsing = false;
        updateParseButton(false);
        updateStatus('所有线路均不可用，请稍后重试', 'error', true);
        return;
      }

      const server = PARSE_SERVERS[serverIndex];
      currentServerIndex = serverIndex;
      updateServerButtons();
      updateStatus(`正在尝试 ${server.name}，请稍候...`, 'loading');

      // 创建AbortController用于超时取消
      const controller = new AbortController();
      abortControllers.push(controller);

      // 设置超时
      const timeoutId = setTimeout(() => {
        controller.abort();
        updateStatus(`${server.name} 超时，正在切换...`, 'loading');
        parseWithServer(url, serverIndex + 1);
      }, TIMEOUT_MS);
      timeoutIds.push(timeoutId);

      try {
        // 构建解析URL
        const parseUrl = server.url + encodeURIComponent(url);

        // 使用 fetch 检测线路是否可用（简单检测）
        // 注意：这里使用 no-cors 模式，因为大多数解析接口不支持CORS
        const response = await fetch(parseUrl, {
          method: 'HEAD',
          signal: controller.signal,
          mode: 'no-cors',
          cache: 'no-cache'
        });

        // no-cors 模式下 response.ok 总是 true，所以我们直接尝试使用
        clearTimeout(timeoutId);

        // 解析成功 - 使用iframe加载
        onParseSuccess(parseUrl);

      } catch (error) {
        if (error.name === 'AbortError') {
          // 超时导致的取消，不需要额外处理
        } else {
          // 其他错误，尝试下一条线路
          clearTimeout(timeoutId);
          updateStatus(`${server.name} 不可用，正在切换...`, 'loading');
          await parseWithServer(url, serverIndex + 1);
        }
      }
    }

    /**
     * 解析成功回调
     * @param {string} playUrl 播放地址
     */
    function onParseSuccess(playUrl) {
      isParsing = false;
      updateParseButton(false);
      updateStatus('解析成功，播放中', 'success');

      // 显示画质选择栏
      qualitySection.classList.remove('hidden');
      renderQualityButtons();

      // 显示播放器
      playerSection.classList.remove('hidden');

      // 加载播放地址到iframe
      videoPlayer.src = playUrl;

      // 添加到历史记录
      addHistory(currentUrl);

      // 3秒后恢复状态提示
      setTimeout(() => {
        if (!isParsing) {
          updateStatus('解析成功，播放中', 'success');
        }
      }, 3000);
    }

    /**
     * =====================================================
     * 事件绑定
     * =====================================================
     */

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 渲染线路列表
      renderServers();

      // 渲染历史记录
      renderHistory();

      // 回车触发解析
      urlInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          handleParse();
        }
      });

      // Ctrl+V 粘贴后自动解析（检测到有效URL时）
      urlInput.addEventListener('paste', (e) => {
        setTimeout(() => {
          const url = urlInput.value.trim();
          if (url && isValidVideoUrl(url)) {
            handleParse();
          }
        }, 100);
      });

      // 监听输入变化，清除错误状态
      urlInput.addEventListener('input', () => {
        if (statusText.classList.contains('text-[#ff6b6b]')) {
          updateStatus('请输入视频链接后点击解析', 'info');
        }
      });
    });

    /**
     * 简单验证URL是否为有效视频平台链接
     * @param {string} url
     * @returns {boolean}
     */
    function isValidVideoUrl(url) {
      try {
        new URL(url);
        return detectPlatform(url) !== null;
      } catch {
        return false;
      }
    }

    // 页面卸载前清理
    window.addEventListener('beforeunload', () => {
      cleanup();
    });
  </script>

</body>
</html>
